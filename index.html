<style>
html, body {
  margin: 0;
  padding: 0;
  width: 100%;
  height: 100%;
  overflow: hidden;
  font-family: 'Roboto', sans-serif;
  background: black;
}

/* LOADING */
.loading {
  position: fixed;
  width: 100%;
  height: 100%;
  background: black;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-direction: column;
  z-index: 999;
  color: white;
}

.spinner {
  width: 40px;
  height: 40px;
  border: 4px solid #333;
  border-top: 4px solid #25D366;
  border-radius: 50%;
  animation: spin 1s linear infinite;
}

@keyframes spin {
  100% {transform: rotate(360deg);}
}

/* CONTAINER */
.container {
  position: relative;
  width: 100%;
  height: 100vh;
}

/* VIDEO */
.bg-video {
  position: absolute;
  width: 100%;
  height: 100%;
  z-index: 0;
}

.bg-video video {
  width: 100%;
  height: 100%;
  object-fit: cover;
}

/* OVERLAY */
.overlay {
  position: absolute;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.55);
  backdrop-filter: blur(6px);
  z-index: 1;
}

/* HEADER */
.header {
  position: relative;
  z-index: 3;
  background: #008069;
  padding: 12px;
  color: white;
  font-weight: 500;
}

/* CONTENT */
.content {
  position: relative;
  z-index: 2;
  text-align: center;
  padding-top: 70px;
  color: white;
}

/* ICON */
.icon {
  width: 90px;
  height: 90px;
  background: #25D366;
  border-radius: 50%;
  margin: 0 auto;
  display: flex;
  align-items: center;
  justify-content: center;
  animation: pulse 1.2s infinite alternate;
}

@keyframes pulse {
  from {transform: scale(1);}
  to {transform: scale(1.08);}
}

.title {
  margin-top: 14px;
  font-size: 20px;
  font-weight: 500;
}

.admin {
  font-size: 13px;
  color: #d1d7db;
  margin-top: 4px;
}

.stats {
  margin-top: 18px;
  display: flex;
  justify-content: center;
  gap: 40px;
}

.stats span {
  display: block;
  font-weight: 500;
}

.info-box {
  margin: 20px auto;
  width: 80%;
  background: rgba(32,44,51,0.9);
  border-radius: 10px;
  padding: 12px;
  font-size: 12px;
  color: #8696a0;
}

/* ONLINE */
.online {
  margin-top: 8px;
  font-size: 13px;
  color: #25D366;
}

/* BUTTON */
.btn {
  display: block;
  text-align: center;
  text-decoration: none;
  margin-top: 15px;
  background: #25D366;
  color: black;
  padding: 14px;
  width: 80%;
  margin-left: auto;
  margin-right: auto;
  border-radius: 30px;
  font-weight: 600;
}
</style>
</head>
